name: release

on: push

jobs:
  create:
    runs-on:  macos-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/cache@v2
        with:
          key:  sha256:9dfadb3ba00b561287b4caf2ab00967ea0b188da353a644acc70fd30cf5371e2
          path: packer_cache
      - name: Run packer build
        env:
          VERSION:      1.9.0
          ISO_CHECKSUM: sha256:9dfadb3ba00b561287b4caf2ab00967ea0b188da353a644acc70fd30cf5371e2
        run: |
          set -eux
          VBoxManage -v
          packer -v
          packer build -only=virtualbox-iso \
            -var version=$VERSION \
            -var headless=true \
            -var iso_url=https://github.com/burmilla/os/releases/download/v$VERSION/burmillaos-v$VERSION.iso \
            -var iso_checksum=$ISO_CHECKSUM \
            template.json
          file=burmillaos-openstack.vmdk
          mv output-virtualbox-iso/burmillaos-disk001.vmdk $file
          echo -e "md5: $(md5 -q $file)  $file\nsha256: $(shasum -a 256 $file)" | tee checksums.txt
      - uses: actions/create-release@v1
        id:   create_release
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          tag_name: v1.9.0
          release_name: v1.9.0
      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          upload_url: ${{steps.create_release.outputs.upload_url}}
          asset_path: burmilla-openstack.vmdk
          asset_name: burmilla-openstack.vmdk
          asset_content_type: application/octet-stream
      - uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          upload_url: ${{steps.create_release.outputs.upload_url}}
          asset_path: checksums.txt
          asset_name: checksums.txt
          asset_content_type: text/plain
